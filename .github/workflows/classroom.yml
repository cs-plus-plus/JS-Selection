name: autograde

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  autograde:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Jest
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install --save-dev jest@29

      - name: Write jest config
        run: |
          cat > jest.config.cjs <<'EOF'
          module.exports = {
            testEnvironment: 'node',
            testMatch: ['**/__tests__/**/*.test.cjs']
          };
          EOF

      - name: Write tests
        run: |
          mkdir -p __tests__
          cat > __tests__/selection.test.cjs <<'TESTEOF'
          const fs = require('fs');
          const path = require('path');
          const vm = require('vm');

          const source = fs.readFileSync(path.resolve('script.js'), 'utf8');

          function runFunc(funcName, promptValue) {
            const alerts = [];
            const sandbox = {
              prompt: function(msg) { return promptValue; },
              alert: function(msg) { alerts.push(String(msg)); },
              console: { log: function(){}, error: function(){}, warn: function(){} },
              parseInt: parseInt,
              parseFloat: parseFloat,
              isNaN: isNaN,
              NaN: NaN,
              undefined: undefined,
              String: String,
              Number: Number,
              Math: Math,
            };
            vm.createContext(sandbox);
            vm.runInContext(source, sandbox, { timeout: 5000 });
            if (typeof sandbox[funcName] === 'function') {
              sandbox[funcName]();
            }
            return alerts;
          }

          describe('Unit 8.3 – Selection & Conditionals', function() {

            test('checkNumber positive', function() {
              let alerts = runFunc('checkNumber', '5');
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Positive');
            });

            test('checkNumber negative', function() {
              let alerts = runFunc('checkNumber', '-3');
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Negative');
            });

            test('checkNumber zero', function() {
              let alerts = runFunc('checkNumber', '0');
              expect(alerts.length).toBeGreaterThanOrEqual(1);
              expect(alerts[0]).toBe('Zero');
            });

            test('uses strict equality', function() {
              expect(source).toMatch(/===/);
            });

            test('uses parseInt', function() {
              expect(source).toMatch(/parseInt\s*\(/);
            });

            test('invalid input handling', function() {
              let invalids = ['abc', '', '-1', null];
              for (let i = 0; i < invalids.length; i++) {
                let alerts = runFunc('ticketPrice', invalids[i]);
                expect(alerts.length).toBeGreaterThanOrEqual(1);
                expect(alerts[0]).toBe('Invalid input');
              }
            });

            test('child ticket', function() {
              expect(runFunc('ticketPrice', '0')[0]).toBe('Child: $7');
              expect(runFunc('ticketPrice', '5')[0]).toBe('Child: $7');
              expect(runFunc('ticketPrice', '12')[0]).toBe('Child: $7');
            });

            test('teen ticket', function() {
              expect(runFunc('ticketPrice', '13')[0]).toBe('Teen: $12');
              expect(runFunc('ticketPrice', '17')[0]).toBe('Teen: $12');
            });

            test('adult ticket', function() {
              expect(runFunc('ticketPrice', '18')[0]).toBe('Adult: $20');
              expect(runFunc('ticketPrice', '35')[0]).toBe('Adult: $20');
              expect(runFunc('ticketPrice', '64')[0]).toBe('Adult: $20');
            });

            test('senior ticket', function() {
              expect(runFunc('ticketPrice', '65')[0]).toBe('Senior: $12');
              expect(runFunc('ticketPrice', '80')[0]).toBe('Senior: $12');
            });

          });
          TESTEOF

      # === Graded steps (sum to 100) ===
      - id: t_positive
        name: checkNumber positive
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: checkNumber positive
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "checkNumber positive$"
          timeout: 60
          max-score: 5

      - id: t_negative
        name: checkNumber negative
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: checkNumber negative
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "checkNumber negative$"
          timeout: 60
          max-score: 5

      - id: t_zero
        name: checkNumber zero
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: checkNumber zero
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "checkNumber zero$"
          timeout: 60
          max-score: 5

      - id: t_strict_eq
        name: uses strict equality
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: uses strict equality
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "uses strict equality$"
          timeout: 60
          max-score: 5

      - id: t_parseint
        name: uses parseInt
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: uses parseInt
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "uses parseInt$"
          timeout: 60
          max-score: 5

      - id: t_invalid
        name: invalid input handling
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: invalid input handling
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "invalid input handling$"
          timeout: 60
          max-score: 15

      - id: t_child
        name: child ticket
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: child ticket
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "child ticket$"
          timeout: 60
          max-score: 20

      - id: t_teen
        name: teen ticket
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: teen ticket
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "teen ticket$"
          timeout: 60
          max-score: 15

      - id: t_adult
        name: adult ticket
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: adult ticket
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "adult ticket$"
          timeout: 60
          max-score: 10

      - id: t_senior
        name: senior ticket
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: senior ticket
          setup-command: echo "ready"
          command: npx jest --runInBand --testNamePattern "senior ticket$"
          timeout: 60
          max-score: 15

      # Summary
      - name: Build summary
        shell: bash
        run: |
          npx jest --runInBand --json --outputFile=jest-summary.json || true
          node - <<'NODE'
          const fs = require("fs");
          let jr = {};
          try { jr = JSON.parse(fs.readFileSync("jest-summary.json","utf8")); } catch {}
          const assertions = (jr.testResults||[]).flatMap(t => t.assertionResults || []);
          const tests = [
            { name: "checkNumber positive", pts: 5 },
            { name: "checkNumber negative", pts: 5 },
            { name: "checkNumber zero", pts: 5 },
            { name: "uses strict equality", pts: 5 },
            { name: "uses parseInt", pts: 5 },
            { name: "invalid input handling", pts: 15 },
            { name: "child ticket", pts: 20 },
            { name: "teen ticket", pts: 15 },
            { name: "adult ticket", pts: 10 },
            { name: "senior ticket", pts: 15 },
          ];
          let earned = 0;
          const lines = ["# Unit 8.3 Autograder Summary", ""];
          for (const t of tests) {
            const a = assertions.find(x => x.title === t.name);
            const passed = !!a && a.status === "passed";
            if (passed) earned += t.pts;
            lines.push((passed ? "✅" : "❌") + " " + t.name + " (" + t.pts + " pts)");
          }
          lines.push("", "**Score: " + earned + "/100**");
          console.log(lines.join("\n"));
          if (process.env.GITHUB_STEP_SUMMARY) fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          NODE

      - name: Prepare reporter env
        shell: bash
        run: |
          echo "T_POSITIVE_RESULTS=${{ steps.t_positive.outputs.result }}"     >> "$GITHUB_ENV"
          echo "T_NEGATIVE_RESULTS=${{ steps.t_negative.outputs.result }}"     >> "$GITHUB_ENV"
          echo "T_ZERO_RESULTS=${{ steps.t_zero.outputs.result }}"             >> "$GITHUB_ENV"
          echo "T_STRICT_EQ_RESULTS=${{ steps.t_strict_eq.outputs.result }}"   >> "$GITHUB_ENV"
          echo "T_PARSEINT_RESULTS=${{ steps.t_parseint.outputs.result }}"     >> "$GITHUB_ENV"
          echo "T_INVALID_RESULTS=${{ steps.t_invalid.outputs.result }}"       >> "$GITHUB_ENV"
          echo "T_CHILD_RESULTS=${{ steps.t_child.outputs.result }}"           >> "$GITHUB_ENV"
          echo "T_TEEN_RESULTS=${{ steps.t_teen.outputs.result }}"             >> "$GITHUB_ENV"
          echo "T_ADULT_RESULTS=${{ steps.t_adult.outputs.result }}"           >> "$GITHUB_ENV"
          echo "T_SENIOR_RESULTS=${{ steps.t_senior.outputs.result }}"         >> "$GITHUB_ENV"

      - name: Report grades
        uses: classroom-resources/autograding-grading-reporter@v1
        with:
          runners: 't_positive,t_negative,t_zero,t_strict_eq,t_parseint,t_invalid,t_child,t_teen,t_adult,t_senior'
          token: ${{ github.token }}
